<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 对话</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            background: #f5f5f5;
            padding: 20px;
        }
        .chat-container {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            overflow: hidden;
            height: 85vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            padding: 15px;
            background: #007bff;
            color: white;
            text-align: center;
            font-weight: bold;
        }
        .messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .msg {
            padding: 10px 15px;
            border-radius: 15px;
            max-width: 75%;
            line-height: 1.5;
        }
        .user {
            background: #007bff;
            color: white;
            align-self: flex-end;
        }
        .ai {
            background: #e9e9eb;
            color: #333;
            align-self: flex-start;
        }
        .input-box {
            display: flex;
            padding: 15px;
            border-top: 1px solid #eee;
        }
        #inputText {
            flex: 1;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 25px;
            outline: none;
            font-size: 14px;
        }
        #sendBtn {
            margin-left: 10px;
            padding: 12px 20px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
        }
        #sendBtn:disabled {
            background: #6ab7ff;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="header">AI 对话助手</div>
        <div class="messages" id="msgBox"></div>
        <div class="input-box">
            <input type="text" id="inputText" placeholder="输入消息...">
            <button id="sendBtn">发送</button>
        </div>
    </div>

    <script>
        // ========== 只需要改这里 3 个信息 ==========
        const API_URL = "https://t8jn2bbr9k.coze.site/stream_run";
        const API_TOKEN = "uLh7ftujVLFv02Qw0xHD4giMWTLUPqQiSDaYgKfvxHSVebSmasyVjQF8ciqNlPasFzJSTpQ8Tx2kIeJXELDwNstl7FztNcmkS7wihulHpAuyLYCVwMJImmB3pu8xvVhC55lsH4SzCbXUVhyJT4qMzm25LNcV7QSi27bdrA";
        const PROJECT_ID = "7636326096509665316";
        // ======================================

        const msgBox = document.getElementById("msgBox");
        const inputText = document.getElementById("inputText");
        const sendBtn = document.getElementById("sendBtn");

        // 追加消息
        function addMsg(text, isUser = false) {
            const div = document.createElement("div");
            div.className = `msg ${isUser ? "user" : "ai"}`;
            div.textContent = text;
            msgBox.appendChild(div);
            msgBox.scrollTop = msgBox.scrollHeight;
            return div;
        }

        // 发送逻辑
        async function send() {
            const text = inputText.value.trim();
            if (!text) return;

            addMsg(text, true);
            inputText.value = "";
            sendBtn.disabled = true;

            const aiMsg = addMsg("正在思考...");

            try {
                const res = await fetch(API_URL, {
                    method: "POST",
                    headers: {
                        "Authorization": "Bearer " + API_TOKEN,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        "content": {
                            "query": {
                                "prompt": [{
                                    "type": "text",
                                    "content": { "text": text }
                                }]
                            },
                            "type": "query"
                        },
                        "session_id": "test-session-" + Date.now(),
                        "project_id": PROJECT_ID
                    })
                });

                if (!res.body) throw new Error("不支持流式输出");

                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                let result = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value, { stream: true });
                    const lines = chunk.split("\n");

                    for (const line of lines) {
                        if (!line.startsWith("data: ")) continue;
                        const jsonStr = line.replace("data: ", "").trim();
                        if (!jsonStr || jsonStr === "[DONE]") continue;

                        try {
                            const data = JSON.parse(jsonStr);
                            // 兼容多种返回格式，自动识别
                            const content = 
                                data.content || 
                                data.message?.content || 
                                data.data?.content || 
                                "";
                            
                            if (content) {
                                result += content;
                                aiMsg.textContent = result;
                                msgBox.scrollTop = msgBox.scrollHeight;
                            }
                        } catch (e) {}
                    }
                }
            } catch (err) {
                aiMsg.textContent = "连接失败：" + err.message;
                console.error(err);
            } finally {
                sendBtn.disabled = false;
            }
        }

        sendBtn.onclick = send;
        inputText.addEventListener("keydown", e => {
            if (e.key === "Enter") send();
        });
    </script>
</body>
</html>
