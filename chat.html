<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 对话</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            background: #f5f5f5;
            padding: 20px;
        }
        .chat-container {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            overflow: hidden;
            height: 85vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            padding: 15px;
            background: #007bff;
            color: white;
            text-align: center;
            font-weight: bold;
        }
        .messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .msg {
            padding: 10px 15px;
            border-radius: 15px;
            max-width: 75%;
            line-height: 1.5;
        }
        .user {
            background: #007bff;
            color: white;
            align-self: flex-end;
        }
        .ai {
            background: #e9e9eb;
            color: #333;
            align-self: flex-start;
        }
        .input-box {
            display: flex;
            padding: 15px;
            border-top: 1px solid #eee;
        }
        #inputText {
            flex: 1;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 25px;
            outline: none;
            font-size: 14px;
        }
        #sendBtn {
            margin-left: 10px;
            padding: 12px 20px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
        }
        #sendBtn:disabled {
            background: #6ab7ff;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="header">AI 对话助手</div>
        <div class="messages" id="msgBox"></div>
        <div class="input-box">
            <input type="text" id="inputText" placeholder="输入消息...">
            <button id="sendBtn">发送</button>
        </div>
    </div>

    <script>
        // 你的代理接口地址，保持不变
        const API_URL = "https://express-ai-sdk-two-puce.vercel.app/api/chat";

        const msgBox = document.getElementById("msgBox");
        const inputText = document.getElementById("inputText");
        const sendBtn = document.getElementById("sendBtn");

        function addMsg(text, isUser) {
            const div = document.createElement("div");
            div.className = "msg " + (isUser ? "user" : "ai");
            div.textContent = text;
            msgBox.appendChild(div);
            msgBox.scrollTop = msgBox.scrollHeight;
            return div;
        }

        async function send() {
            const text = inputText.value.trim();
            if (!text) return;

            addMsg(text, true);
            inputText.value = "";
            sendBtn.disabled = true;
            const aiMsg = addMsg("正在回复...", false);

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        text: text,
                        sessionId: "user_session_" + Date.now()
                    })
                });

                if (!response.ok) throw new Error("请求失败：" + response.status);

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullText = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value, { stream: true });
                    const lines = chunk.split("\n");

                    for (let line of lines) {
                        line = line.trim();
                        if (!line || line.startsWith(":")) continue;
                        if (line.startsWith("data: ")) {
                            const jsonStr = line.replace("data: ", "");
                            try {
                                const data = JSON.parse(jsonStr);
                                // 适配 Coze 流式返回的格式
                                if (data?.message?.content) {
                                    fullText += data.message.content;
                                    aiMsg.textContent = fullText;
                                    msgBox.scrollTop = msgBox.scrollHeight;
                                }
                            } catch (e) {
                                console.log("解析失败:", jsonStr);
                            }
                        }
                    }
                }

                if (!fullText) {
                    aiMsg.textContent = "AI 未返回有效回复";
                }

            } catch (error) {
                console.error(error);
                aiMsg.textContent = "连接失败：" + error.message;
            } finally {
                sendBtn.disabled = false;
            }
        }

        sendBtn.addEventListener("click", send);
        inputText.addEventListener("keypress", (e) => {
            if (e.key === "Enter") send();
        });
    </script>
</body>
</html>
